    body {
      width: 220px; padding: 16px;
      font-family: system-ui, sans-serif;
      background: #1a1d27; color: #f1f3f9;

    }
    h2 { font-size: 15px; font-weight: 600; margin: 0 0 6px; }

  <h2>LeetCode Tracker</h2>
